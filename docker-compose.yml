# BusExpress — Local Development Infrastructure
# Usage: docker compose up -d
#
# Services included:
#   - PostgreSQL 16 with PostGIS (port 5432)
#   - Redis x3 for Redlock distributed locking (ports 6379, 6380, 6381)
#   - Zookeeper + Kafka (port 9092)
#   - ElasticSearch 8 (port 9200)
#   - InfluxDB 2 for GPS time-series (port 8086)
#   - HashiCorp Vault in dev mode (port 8200)
#   - MailHog SMTP trap (ports 1025/8025)
#   - Prometheus + Grafana monitoring (ports 9090/3001)

services:
  # ─── PostgreSQL 16 with PostGIS ───────────────────────────────────────
  # Primary relational database with geospatial support for route/stop data
  postgres:
    image: postgis/postgis:16-3.4
    container_name: busexpress-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: busexpress
      POSTGRES_PASSWORD: busexpress_dev
      POSTGRES_DB: busexpress
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busexpress -d busexpress"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis Cluster for Redlock (3 independent instances) ──────────────
  # Three separate Redis instances required for Redlock distributed locking
  # to guarantee zero double-booking (quorum: 2/3, TTL: 600s)
  redis-1:
    image: redis:7-alpine
    container_name: busexpress-redis-1
    ports:
      - "6379:6379"
    volumes:
      - redis_1_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-2:
    image: redis:7-alpine
    container_name: busexpress-redis-2
    ports:
      - "6380:6379"
    volumes:
      - redis_2_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-3:
    image: redis:7-alpine
    container_name: busexpress-redis-3
    ports:
      - "6381:6379"
    volumes:
      - redis_3_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Zookeeper ────────────────────────────────────────────────────────
  # Required by Kafka for cluster coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: busexpress-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Apache Kafka ─────────────────────────────────────────────────────
  # Event streaming for booking, payment, notification, fraud, and ML topics
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: busexpress-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Auto-create the six required topics on first startup
      KAFKA_CREATE_TOPICS: >-
        booking-events:1:1,
        payment-events:1:1,
        notification-events:1:1,
        fraud-scoring:1:1,
        ml-feedback:1:1,
        user-events:1:1
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Kafka topic initializer — creates topics that KAFKA_CREATE_TOPICS cannot
  # (cp-kafka does not natively support KAFKA_CREATE_TOPICS; this sidecar does)
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: busexpress-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        for topic in booking-events payment-events notification-events fraud-scoring ml-feedback user-events; do
          kafka-topics --create --if-not-exists \
            --bootstrap-server kafka:9092 \
            --replication-factor 1 \
            --partitions 1 \
            --topic "$$topic"
          echo "  -> $$topic created"
        done
        echo "All topics ready."
    restart: "no"

  # ─── ElasticSearch 8 ──────────────────────────────────────────────────
  # Full-text search engine for trip search, autocomplete, and BM25 scoring
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: busexpress-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── InfluxDB 2 ──────────────────────────────────────────────────────
  # Time-series database for GPS tracking and ETA computation
  influxdb:
    image: influxdb:2.7
    container_name: busexpress-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: busexpress
      DOCKER_INFLUXDB_INIT_PASSWORD: busexpress_dev
      DOCKER_INFLUXDB_INIT_ORG: busexpress
      DOCKER_INFLUXDB_INIT_BUCKET: gps
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-influxdb-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── HashiCorp Vault (dev mode) ──────────────────────────────────────
  # Secret management — dev mode with a fixed root token for local development
  vault:
    image: hashicorp/vault:1.16
    container_name: busexpress-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── MailHog ──────────────────────────────────────────────────────────
  # SMTP trap for local email testing — web UI at http://localhost:8025
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: busexpress-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────────────────
  # Metrics collection — config at deploy/prometheus/prometheus.yml
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: busexpress-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────────────
  # Dashboards and visualization — accessible at http://localhost:3001
  # Port 3001 to avoid conflict with Next.js dev server on 3000
  grafana:
    image: grafana/grafana:10.4.0
    container_name: busexpress-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ─── Named Volumes ────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_1_data:
  redis_2_data:
  redis_3_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  es_data:
  influxdb_data:
  prometheus_data:
  grafana_data:
