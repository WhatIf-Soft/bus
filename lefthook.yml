pre-commit:
  parallel: true
  commands:
    go-lint:
      glob: "*.go"
      run: golangci-lint run --config .golangci.yml --new-from-rev=HEAD {staged_files}
    go-fmt:
      glob: "*.go"
      run: gofumpt -l -d {staged_files}
    frontend-lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: cd web && pnpm eslint {staged_files}
    frontend-fmt:
      glob: "*.{ts,tsx,js,jsx,css}"
      run: cd web && pnpm prettier --check {staged_files}

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}

pre-push:
  commands:
    go-test:
      run: cd pkg && go test -short ./...
    frontend-typecheck:
      run: cd web && pnpm tsc --noEmit
