{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-service
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}-service
    {{- include "busexpress.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}-service
  template:
    metadata:
      labels:
        app: {{ $name }}-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: {{ $name }}-service
          image: {{ $.Values.global.image.registry }}/{{ $name }}-service:{{ $.Values.global.image.tag }}
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: busexpress-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ $svc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- if $svc.resources }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-service
  namespace: {{ $.Values.global.namespace }}
spec:
  selector:
    app: {{ $name }}-service
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP
  type: ClusterIP
{{- end }}
{{- end }}
