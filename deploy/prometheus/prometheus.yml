# Prometheus configuration for BusExpress local development.
# Aligned with the actual port mapping used by each microservice.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "user-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4001"]

  - job_name: "search-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4002"]

  - job_name: "booking-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4003"]

  - job_name: "payment-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4004"]

  - job_name: "ticket-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4005"]

  - job_name: "notification-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4006"]

  - job_name: "operator-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4007"]

  - job_name: "review-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4008"]

  - job_name: "waitlist-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4009"]

  - job_name: "support-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4010"]

  - job_name: "reconciliation-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4011"]
