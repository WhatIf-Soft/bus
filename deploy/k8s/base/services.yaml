# BusExpress Kubernetes manifests — all 17 microservices.
# Apply: kubectl apply -f deploy/k8s/base/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: busexpress
spec:
  replicas: 2
  selector:
    matchLabels: { app: user-service }
  template:
    metadata:
      labels: { app: user-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4001"
    spec:
      containers:
        - name: user-service
          image: busexpress/user-service:latest
          ports: [{ containerPort: 4001 }]
          envFrom: [{ secretRef: { name: busexpress-secrets } }]
          readinessProbe: { httpGet: { path: /readyz, port: 4001 }, initialDelaySeconds: 5 }
          livenessProbe: { httpGet: { path: /healthz, port: 4001 }, initialDelaySeconds: 10 }
          resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 512Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: user-service, namespace: busexpress }
spec:
  selector: { app: user-service }
  ports: [{ port: 4001, targetPort: 4001 }]
