# Template for a BusExpress microservice Deployment + Service.
# Copy and customize per service, or use Helm chart (deploy/helm/).
#
# Replace: SERVICE_NAME, SERVICE_PORT, IMAGE_TAG
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVICE_NAME
  namespace: busexpress
  labels:
    app: SERVICE_NAME
    app.kubernetes.io/part-of: busexpress
spec:
  replicas: 2
  selector:
    matchLabels:
      app: SERVICE_NAME
  template:
    metadata:
      labels:
        app: SERVICE_NAME
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "SERVICE_PORT"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: SERVICE_NAME
          image: busexpress/SERVICE_NAME:IMAGE_TAG
          ports:
            - containerPort: SERVICE_PORT
              protocol: TCP
          env:
            - name: SERVICE_NAME_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: busexpress-db-secrets
                  key: SERVICE_NAME-dsn
            - name: SERVICE_NAME_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: busexpress-jwt-secret
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: SERVICE_PORT
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: SERVICE_PORT
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: SERVICE_NAME
  namespace: busexpress
spec:
  selector:
    app: SERVICE_NAME
  ports:
    - port: SERVICE_PORT
      targetPort: SERVICE_PORT
      protocol: TCP
  type: ClusterIP
